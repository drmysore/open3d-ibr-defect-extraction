<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase Viewer — IBR Defect Extraction</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root {
    --bg: #0a0e17; --surface: #131a2b; --surface2: #1a2338;
    --border: #2a3654; --text: #e2e8f0; --text-muted: #8892a4;
    --accent: #3b82f6; --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 32px; display: flex; align-items: center; gap: 24px;
  }
  .topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .topbar h1 span { color: var(--accent); }
  .topbar nav { display: flex; gap: 16px; margin-left: auto; }
  .topbar nav a {
    color: var(--text-muted); font-size: 13px; font-weight: 500;
    padding: 6px 14px; border-radius: 6px; transition: all .15s;
  }
  .topbar nav a:hover, .topbar nav a.active { color: var(--text); background: var(--surface2); text-decoration: none; }

  .container { max-width: 1440px; margin: 0 auto; padding: 24px 32px; }

  .tab-bar {
    display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .tab-btn {
    padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    background: transparent; transition: all .15s; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface2); }
  .tab-btn.active { color: #fff; background: var(--accent); }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-header h2 { font-size: 14px; font-weight: 600; }
  .card-body { padding: 20px; }

  .btn {
    padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #2563eb; }
  .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-outline:hover { background: rgba(59,130,246,.1); }

  #plot-container { width: 100%; height: 700px; }

  .spinner-wrap {
    display: none; align-items: center; justify-content: center;
    height: 700px; flex-direction: column; gap: 14px;
  }
  .spinner-wrap.show { display: flex; }
  .spinner {
    width: 44px; height: 44px; border: 4px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-text { color: var(--text-muted); font-size: 13px; }

  .empty-msg {
    display: none; text-align: center; padding: 80px 20px; color: var(--text-muted);
  }
  .empty-msg.show { display: block; }
  .empty-msg h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
</style>
</head>
<body>

<div class="topbar">
  <h1><span>IBR</span> Defect Extraction System</h1>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/viewer3d">3D Viewer</a>
    <a href="/reports">Reports</a>
    <a href="/phase-viewer" class="active">Phase Viewer</a>
    <a href="/inferno-viewer">Inferno 3D</a>
    <a href="/comparison">Compare</a>
    <a href="/gallery">Gallery</a>
    <a href="/maintenance">Maintenance</a>
    <a href="/quality-audits">Audits</a>
    <a href="/batch-jobs">Batch</a>
  </nav>
</div>

<div class="container">
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-phase="1">Phase 1 — Raw Scan</button>
    <button class="tab-btn" data-phase="3">Phase 3 — Deviation</button>
    <button class="tab-btn" data-phase="4">Phase 4 — Segmentation</button>
    <button class="tab-btn" data-phase="5">Phase 5 — Clustering</button>
    <button class="tab-btn" data-phase="7">Phase 7 — Zone Map</button>
  </div>

  <div class="card">
    <div class="card-header">
      <h2 id="phase-title">Phase 1 — Raw Scan</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline" id="btn-export" onclick="exportHTML()">Export HTML</button>
      </div>
    </div>
    <div class="card-body">
      <div class="spinner-wrap" id="spinner">
        <div class="spinner"></div>
        <div class="spinner-text">Loading phase figure...</div>
      </div>
      <div class="empty-msg" id="empty-msg">
        <h3>No Figure Available</h3>
        <p>Run the pipeline first to generate phase visualizations.</p>
      </div>
      <div id="plot-container"></div>
    </div>
  </div>
</div>

<script>
const PHASES = {
  1: 'Phase 1 — Raw Scan',
  3: 'Phase 3 — Deviation',
  4: 'Phase 4 — Segmentation',
  5: 'Phase 5 — Clustering',
  7: 'Phase 7 — Zone Map',
};

let currentPhase = 1;
const cache = {};

const plotEl = document.getElementById('plot-container');
const spinnerEl = document.getElementById('spinner');
const emptyEl = document.getElementById('empty-msg');
const titleEl = document.getElementById('phase-title');

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.tab-btn.active').classList.remove('active');
    btn.classList.add('active');
    currentPhase = parseInt(btn.dataset.phase);
    titleEl.textContent = PHASES[currentPhase];
    loadPhase(currentPhase);
  });
});

function loadPhase(phase) {
  plotEl.style.display = 'none';
  emptyEl.classList.remove('show');
  spinnerEl.classList.add('show');

  if (cache[phase]) {
    renderFigure(cache[phase]);
    return;
  }

  fetch('/api/phases/' + phase + '/figure')
    .then(r => {
      if (!r.ok) throw new Error('Not found');
      return r.json();
    })
    .then(fig => {
      cache[phase] = fig;
      renderFigure(fig);
    })
    .catch(() => {
      spinnerEl.classList.remove('show');
      emptyEl.classList.add('show');
    });
}

function renderFigure(fig) {
  spinnerEl.classList.remove('show');
  emptyEl.classList.remove('show');
  plotEl.style.display = 'block';

  fig.layout = fig.layout || {};
  fig.layout.paper_bgcolor = '#131a2b';
  fig.layout.plot_bgcolor = '#131a2b';
  fig.layout.font = { color: '#e2e8f0', family: 'Segoe UI, system-ui, sans-serif', size: 12 };
  fig.layout.margin = fig.layout.margin || { t: 30, b: 30, l: 30, r: 30 };
  if (fig.layout.scene) {
    fig.layout.scene.bgcolor = '#0a0e17';
    ['xaxis','yaxis','zaxis'].forEach(ax => {
      if (fig.layout.scene[ax]) {
        fig.layout.scene[ax].gridcolor = '#1a2338';
        fig.layout.scene[ax].color = '#8892a4';
      }
    });
  }

  Plotly.react(plotEl, fig.data, fig.layout, { responsive: true });
}

function exportHTML() {
  window.open('/api/phases/' + currentPhase + '/html', '_blank');
}

loadPhase(1);
</script>

</body>
</html>
