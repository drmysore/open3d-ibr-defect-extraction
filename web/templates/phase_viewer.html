<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase Viewer — IBR Defect Extraction</title>
<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<style>
  :root {
    --bg: #0a0e17; --surface: #131a2b; --surface2: #1a2338;
    --border: #2a3654; --text: #e2e8f0; --text-muted: #8892a4;
    --accent: #3b82f6; --green: #22c55e; --amber: #f59e0b; --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .topbar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 32px; display: flex; align-items: center; gap: 24px;
  }
  .topbar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
  .topbar h1 span { color: var(--accent); }
  .topbar nav { display: flex; gap: 16px; margin-left: auto; }
  .topbar nav a {
    color: var(--text-muted); font-size: 13px; font-weight: 500;
    padding: 6px 14px; border-radius: 6px; transition: all .15s;
  }
  .topbar nav a:hover, .topbar nav a.active { color: var(--text); background: var(--surface2); text-decoration: none; }

  .container { max-width: 1440px; margin: 0 auto; padding: 24px 32px; }

  .tab-bar {
    display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 4px; margin-bottom: 20px; flex-wrap: wrap;
  }
  .tab-btn {
    padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    background: transparent; transition: all .15s; white-space: nowrap;
  }
  .tab-btn:hover { color: var(--text); background: var(--surface2); }
  .tab-btn.active { color: #fff; background: var(--accent); }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden;
  }
  .card-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-header h2 { font-size: 14px; font-weight: 600; }
  .card-body { padding: 20px; }

  .btn {
    padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #2563eb; }
  .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .btn-outline:hover { background: rgba(59,130,246,.1); }

  #plot-container { width: 100%; height: 700px; }

  .spinner-wrap {
    display: none; align-items: center; justify-content: center;
    height: 700px; flex-direction: column; gap: 14px;
  }
  .spinner-wrap.show { display: flex; }
  .spinner {
    width: 44px; height: 44px; border: 4px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner-text { color: var(--text-muted); font-size: 13px; }

  .empty-msg {
    display: none; text-align: center; padding: 80px 20px; color: var(--text-muted);
  }
  .empty-msg.show { display: block; }
  .empty-msg h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }

  .report-banner {
    display: none; padding: 12px 20px; border-radius: 10px; margin-bottom: 16px;
    background: linear-gradient(135deg, rgba(59,130,246,.12), rgba(34,197,94,.08));
    border: 1px solid var(--border); font-size: 13px; color: var(--text-muted);
    align-items: center; gap: 10px;
  }
  .report-banner.show { display: flex; }
  .report-banner .part { font-weight: 700; color: var(--accent); }
  .report-banner .stat { color: var(--text); font-weight: 600; }
  .report-banner .disp { padding: 2px 10px; border-radius: 4px; font-weight: 700; font-size: 12px; text-transform: uppercase; }
  .disp-serviceable { background: rgba(34,197,94,.15); color: var(--green); }
  .disp-blend { background: rgba(245,158,11,.15); color: var(--amber); }
  .disp-replace { background: rgba(239,68,68,.15); color: var(--red); }

  #phase8-container {
    display: none; width: 100%;
  }
  #phase8-container .p8-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;
  }
  #phase8-container .p8-full { width: 100%; }
  .p8-chart { height: 360px; }
  .p8-chart-full { height: 340px; }
</style>
</head>
<body>

<div class="topbar">
  <h1><span>IBR</span> Defect Extraction System</h1>
  <nav>
    <a href="/">Dashboard</a>
    <a href="/viewer3d">3D Viewer</a>
    <a href="/reports">Reports</a>
    <a href="/phase-viewer" class="active">Phase Viewer</a>
    <a href="/inferno-viewer">Inferno 3D</a>
    <a href="/comparison">Compare</a>
    <a href="/gallery">Gallery</a>
    <a href="/maintenance">Maintenance</a>
    <a href="/quality-audits">Audits</a>
    <a href="/defect-library">Defect Library</a>
    <a href="/metrics-3d">3D Metrics</a>
  </nav>
</div>

<div class="container">
  <div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" data-phase="1">Phase 1 — Raw Scan</button>
    <button class="tab-btn" data-phase="3">Phase 3 — Deviation</button>
    <button class="tab-btn" data-phase="4">Phase 4 — Segmentation</button>
    <button class="tab-btn" data-phase="5">Phase 5 — Clustering</button>
    <button class="tab-btn" data-phase="7">Phase 7 — Zone Map</button>
    <button class="tab-btn" data-phase="8">Phase 8 — Defect Summary</button>
  </div>

  <div class="report-banner" id="report-banner">
    Loaded from: <span class="part" id="banner-part"></span> —
    <span class="stat" id="banner-defects"></span> defects,
    <span class="stat" id="banner-foils"></span> foils,
    <span class="disp" id="banner-disp"></span>
  </div>

  <div class="card">
    <div class="card-header">
      <h2 id="phase-title">Phase 1 — Raw Scan</h2>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-outline" id="btn-export" onclick="exportHTML()">Export HTML</button>
      </div>
    </div>
    <div class="card-body">
      <div class="spinner-wrap" id="spinner">
        <div class="spinner"></div>
        <div class="spinner-text">Loading phase figure...</div>
      </div>
      <div class="empty-msg" id="empty-msg">
        <h3 id="empty-title">No Figure Available</h3>
        <p id="empty-detail">Run the pipeline first to generate phase visualizations.</p>
      </div>
      <div id="plot-container"></div>
      <div id="phase8-container">
        <div class="p8-row">
          <div id="p8-donut" class="p8-chart"></div>
          <div id="p8-type-bar" class="p8-chart"></div>
        </div>
        <div class="p8-full">
          <div id="p8-foil-bar" class="p8-chart-full"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const PHASES = {
  1: 'Phase 1 — Raw Scan',
  3: 'Phase 3 — Deviation',
  4: 'Phase 4 — Segmentation',
  5: 'Phase 5 — Clustering',
  7: 'Phase 7 — Zone Map',
  8: 'Phase 8 — Defect Summary',
};

let currentPhase = 1;
let reportData = null;
const cache = {};

const plotEl = document.getElementById('plot-container');
const spinnerEl = document.getElementById('spinner');
const emptyEl = document.getElementById('empty-msg');
const emptyTitle = document.getElementById('empty-title');
const emptyDetail = document.getElementById('empty-detail');
const titleEl = document.getElementById('phase-title');
const phase8El = document.getElementById('phase8-container');
const bannerEl = document.getElementById('report-banner');

function loadReportBanner() {
  fetch('/api/report/latest')
    .then(r => { if (!r.ok) throw new Error('No report'); return r.json(); })
    .then(data => {
      reportData = data;
      document.getElementById('banner-part').textContent = data.part_number || 'Unknown';
      document.getElementById('banner-defects').textContent = data.total_defects || 0;
      document.getElementById('banner-foils').textContent = data.foil_count || 0;
      const dispEl = document.getElementById('banner-disp');
      const disp = (data.overall_disposition || 'N/A').toUpperCase();
      dispEl.textContent = disp;
      dispEl.className = 'disp';
      if (disp === 'SERVICEABLE') dispEl.classList.add('disp-serviceable');
      else if (disp === 'BLEND') dispEl.classList.add('disp-blend');
      else if (disp === 'REPLACE') dispEl.classList.add('disp-replace');
      bannerEl.classList.add('show');
    })
    .catch(() => {});
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.tab-btn.active').classList.remove('active');
    btn.classList.add('active');
    currentPhase = parseInt(btn.dataset.phase);
    titleEl.textContent = PHASES[currentPhase];
    loadPhase(currentPhase);
  });
});

function loadPhase(phase) {
  plotEl.style.display = 'none';
  phase8El.style.display = 'none';
  emptyEl.classList.remove('show');
  spinnerEl.classList.add('show');

  if (phase === 8) {
    loadPhase8();
    return;
  }

  if (cache[phase]) {
    renderFigure(cache[phase]);
    return;
  }

  fetch('/api/phases/' + phase + '/figure')
    .then(r => {
      if (!r.ok) throw new Error('Not found');
      return r.json();
    })
    .then(fig => {
      cache[phase] = fig;
      renderFigure(fig);
    })
    .catch(() => {
      spinnerEl.classList.remove('show');
      const partLabel = reportData ? reportData.part_number : 'this part';
      emptyTitle.textContent = 'Phase ' + phase + ' visualization not available';
      emptyDetail.textContent = 'Run the pipeline for ' + partLabel + ' to generate phase figures.';
      emptyEl.classList.add('show');
    });
}

function renderFigure(fig) {
  spinnerEl.classList.remove('show');
  emptyEl.classList.remove('show');
  plotEl.style.display = 'block';

  fig.layout = fig.layout || {};
  fig.layout.paper_bgcolor = '#131a2b';
  fig.layout.plot_bgcolor = '#131a2b';
  fig.layout.font = { color: '#e2e8f0', family: 'Segoe UI, system-ui, sans-serif', size: 12 };
  fig.layout.margin = fig.layout.margin || { t: 30, b: 30, l: 30, r: 30 };
  if (fig.layout.scene) {
    fig.layout.scene.bgcolor = '#0a0e17';
    ['xaxis','yaxis','zaxis'].forEach(ax => {
      if (fig.layout.scene[ax]) {
        fig.layout.scene[ax].gridcolor = '#1a2338';
        fig.layout.scene[ax].color = '#8892a4';
      }
    });
  }

  Plotly.react(plotEl, fig.data, fig.layout, { responsive: true });
}

const P8_LAYOUT_BASE = {
  paper_bgcolor: '#131a2b', plot_bgcolor: '#131a2b',
  font: { color: '#e2e8f0', family: 'Segoe UI, system-ui, sans-serif', size: 12 },
  margin: { t: 40, b: 50, l: 50, r: 20 },
};
const DISP_COLORS = { SERVICEABLE: '#22c55e', BLEND: '#f59e0b', REPLACE: '#ef4444' };

function loadPhase8() {
  const build = (data) => {
    spinnerEl.classList.remove('show');
    phase8El.style.display = 'block';

    const defects = data.defects || [];
    const breakdown = data.disposition_breakdown || {};

    // --- Disposition donut ---
    const dispLabels = Object.keys(breakdown);
    const dispValues = Object.values(breakdown);
    const dispColors = dispLabels.map(l => DISP_COLORS[l.toUpperCase()] || '#8892a4');
    Plotly.react('p8-donut', [{
      labels: dispLabels, values: dispValues, type: 'pie', hole: 0.52,
      marker: { colors: dispColors },
      textinfo: 'label+value', textposition: 'outside',
      textfont: { size: 12 },
    }], { ...P8_LAYOUT_BASE, title: { text: 'Disposition Breakdown', font: { size: 14 } }, showlegend: false }, { responsive: true });

    // --- Defect type bar chart ---
    const typeCounts = {};
    defects.forEach(d => {
      const t = d.classified_type || d.defect_type || d.classification || 'unknown';
      typeCounts[t] = (typeCounts[t] || 0) + 1;
    });
    const typeLabels = Object.keys(typeCounts).sort((a, b) => typeCounts[b] - typeCounts[a]);
    const typeValues = typeLabels.map(l => typeCounts[l]);
    Plotly.react('p8-type-bar', [{
      x: typeLabels, y: typeValues, type: 'bar',
      marker: { color: '#3b82f6', borderRadius: 4 },
      text: typeValues, textposition: 'auto',
    }], {
      ...P8_LAYOUT_BASE,
      title: { text: 'Defect Types', font: { size: 14 } },
      xaxis: { color: '#8892a4', tickangle: -30 },
      yaxis: { color: '#8892a4', title: 'Count', gridcolor: '#1a2338' },
    }, { responsive: true });

    // --- Foil distribution bar chart ---
    const foilCounts = {};
    defects.forEach(d => {
      const f = d.foil_number != null ? d.foil_number : '?';
      foilCounts[f] = (foilCounts[f] || 0) + 1;
    });
    const foilLabels = Object.keys(foilCounts).sort((a, b) => Number(a) - Number(b));
    const foilValues = foilLabels.map(l => foilCounts[l]);
    const foilColors = foilValues.map(v => v >= 4 ? '#ef4444' : v >= 2 ? '#f59e0b' : '#22c55e');
    Plotly.react('p8-foil-bar', [{
      x: foilLabels.map(l => 'Foil ' + l), y: foilValues, type: 'bar',
      marker: { color: foilColors },
      text: foilValues, textposition: 'auto',
    }], {
      ...P8_LAYOUT_BASE,
      title: { text: 'Defects per Foil', font: { size: 14 } },
      xaxis: { color: '#8892a4', tickangle: -45, dtick: 1 },
      yaxis: { color: '#8892a4', title: 'Defect Count', gridcolor: '#1a2338' },
      margin: { t: 40, b: 80, l: 50, r: 20 },
    }, { responsive: true });
  };

  if (reportData && reportData.defects) {
    build(reportData);
    return;
  }

  fetch('/api/report/latest')
    .then(r => { if (!r.ok) throw new Error('No report'); return r.json(); })
    .then(data => { reportData = data; build(data); })
    .catch(() => {
      spinnerEl.classList.remove('show');
      emptyTitle.textContent = 'No inspection report available';
      emptyDetail.textContent = 'Run the pipeline to generate a defect report for the Defect Summary view.';
      emptyEl.classList.add('show');
    });
}

function exportHTML() {
  if (currentPhase === 8) return;
  window.open('/api/phases/' + currentPhase + '/html', '_blank');
}

loadReportBanner();
loadPhase(1);
</script>

</body>
</html>
